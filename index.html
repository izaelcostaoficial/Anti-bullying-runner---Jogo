<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anti-Bullying Runner</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body class="theme-dark">

  <div id="gameContainer">

    <div id="logo">🛡️ Anti-Bullying Runner</div>

    <div id="hud">
      <div class="hud-item">Score: <span id="score">0</span></div>
      <div class="hud-item">Coins: <span id="coins">0</span></div>
      <div class="hud-item">Gems: <span id="gems">0</span></div>
      <div class="hud-item">XP: <span id="xp">0</span></div>
      <div class="hud-item">Level: <span id="level">1</span></div>
      <div class="hud-item">Distance: <span id="distance">0</span></div>
    </div>

    <canvas id="game" width="800" height="400"></canvas>

    <div id="controls">
      <button onclick="game.jump()">⬆ Pular</button>
      <button onclick="game.showScenario('cyberbullying')">⚠ Dilema</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>

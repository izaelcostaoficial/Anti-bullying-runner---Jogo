<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anti-Bullying Runner Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        
        <!-- HUD (Interface durante a corrida) -->
        <div id="hud" class="hidden">
            <div class="hud-top">
                <div class="hud-stat">🪙 <span id="hud-coins">0</span></div>
                <div class="hud-stat">💎 <span id="hud-gems">0</span></div>
                <div class="hud-stat">⭐ <span id="hud-score">0</span></div>
                <div class="hud-stat">❤️ <span id="hud-lives">3</span></div>
            </div>
            <div class="hud-bottom">
                <div id="powerup-bar-container" class="hidden">
                    <div id="powerup-bar"></div>
                </div>
            </div>
        </div>

        <!-- TELA DE LOGIN / TROCA DE NOME (Única visível no início) -->
        <div id="screen-login" class="screen">
            <h1 class="game-title">ANTI-BULLYING<br>RUNNER</h1>
            <div class="form-group">
                <label for="player-name-input">Digite seu Nome:</label>
                <input type="text" id="player-name-input" maxlength="12" placeholder="Jogador123">
            </div>
            <button id="btn-save-name" class="btn-main">Entrar no Jogo</button>
        </div>

        <!-- MENU PRINCIPAL -->
        <div id="screen-menu" class="screen hidden">
            <h1 class="game-title">Anti-Bullying Runner</h1>
            <div class="player-welcome">Olá, <span id="player-display-name">Jogador</span>!</div>
            <div class="high-score-tag">Seu Recorde: <span id="user-high-score">0</span></div>
            
            <button id="btn-start" class="btn-main pulse">JOGAR</button>
            <button id="btn-shop" class="btn-sub">Loja</button>
            <button id="btn-settings" class="btn-sub">Configurações</button>
            <button id="btn-leaderboard" class="btn-sub">Placar Geral</button>
        </div>

        <!-- TELA DE CONFIGURAÇÕES -->
        <div id="screen-settings" class="screen hidden">
            <h2>Configurações</h2>
            <div class="setting-option">
                <label>Idioma / Language:</label>
                <select id="select-lang">
                    <option value="pt">Português</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="setting-option">
                <label>Tema de Cores:</label>
                <select id="select-theme">
                    <option value="vibrant">Neon Vibrante</option>
                    <option value="dark">Modo Escuro</option>
                </select>
            </div>
            <div class="setting-option">
                <label>Áudio:</label>
                <button id="btn-toggle-sound" class="btn-toggle">Som: LIGADO</button>
            </div>
            <button id="btn-settings-back" class="btn-back">Voltar</button>
        </div>

        <!-- TELA DA LOJA -->
        <div id="screen-shop" class="screen hidden">
            <h2>Loja Oficial</h2>
            <div class="currency-display">
                <span>🪙 <span id="shop-coins">0</span></span>
                <span>💎 <span id="shop-gems">0</span></span>
            </div>
            <div class="shop-tabs">
                <button id="tab-chars" class="tab-btn active">Personagens</button>
                <button id="tab-skins" class="tab-btn">Vestes</button>
                <button id="tab-powerups" class="tab-btn">Poderes</button>
            </div>
            <div id="shop-items-container" class="shop-grid"></div>
            <button id="btn-shop-back" class="btn-back">Voltar</button>
        </div>

        <!-- TELA DE PLACAR -->
        <div id="screen-leaderboard" class="screen hidden">
            <h2>Placar de Recordes</h2>
            <div id="leaderboard-list"></div>
            <button id="btn-leaderboard-back" class="btn-back">Voltar</button>
        </div>

        <!-- TELA DE PERGUNTA (QUIZ) -->
        <div id="screen-quiz" class="screen hidden quiz-screen">
            <div class="quiz-box">
                <div class="quiz-timer"><div id="quiz-timer-bar"></div></div>
                <h3 id="quiz-question">Pergunta sobre Anti-Bullying?</h3>
                <div id="quiz-options" class="quiz-options-container"></div>
            </div>
        </div>

        <!-- TELA DE GAME OVER -->
        <div id="screen-gameover" class="screen hidden">
            <h1 class="danger-title">Fim de Jogo!</h1>
            <div class="results-box">
                <p>Pontuação: <span id="go-score">0</span></p>
                <p>Moedas: 🪙 <span id="go-coins">0</span></p>
                <p id="go-new-record" class="hidden new-record-anim">🎉 NOVO RECORDE! 🎉</p>
            </div>
            <button id="btn-retry" class="btn-main">Jogar Novamente</button>
            <button id="btn-go-menu" class="btn-sub">Menu Principal</button>
        </div>

        <!-- CANVAS DO JOGO -->
        <canvas id="gameCanvas" class="hidden"></canvas>

    </div>

    <script src="game.js"></script>
</body>
</html>

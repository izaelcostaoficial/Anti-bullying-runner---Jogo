
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Bullying Runner 🛡️</title>
    <!-- Estilos CSS integrados conforme a documentação [9, 10] -->
    <style>
        :root {
            --cyan: #00d9ff;
            --green: #00ff88;
            --magenta: #ff006e;
            --purple: #5a189a;
            --dark-blue: #0f3460;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body { 
            background: linear-gradient(135deg, var(--purple), var(--dark-blue)); 
            color: var(--white);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container Principal do Jogo [9] */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            height: 100%;
            overflow: hidden;
        }

        /* 1. Tela de Carregamento [11, 12] */
        #loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(var(--purple), var(--dark-blue));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .logo { font-size: 80px; animation: pulse 1.5s infinite; }
        
        .progress-container {
            width: 300px;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--magenta));
            transition: width 3.5s linear;
        }

        /* 2. Menu Principal [12, 13] */
        #menu-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(15, 52, 96, 0.9);
        }

        .profile-section { margin-bottom: 30px; }
        .avatar { font-size: 60px; cursor: pointer; transition: transform 0.2s; }
        .avatar:hover { transform: scale(1.2) rotate(10deg); }
        
        input#player-name {
            background: transparent;
            border: 2px solid var(--cyan);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 18px;
            text-align: center;
        }

        .xp-bar-menu {
            width: 250px;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin: 10px auto;
        }

        .xp-fill { height: 100%; background: var(--green); border-radius: 10px; width: 0%; }

        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: 0.3s;
        }

        .btn-play { background: var(--cyan); color: var(--dark-blue); }
        .btn-play:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--cyan); }

        /* 4. Cenários de Bullying [3, 14, 15] */
        #scenario-popup {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--dark-blue);
